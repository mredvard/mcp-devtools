apiVersion: v1
kind: ConfigMap
metadata:
  name: searxng-config
  namespace: searxng
data:
  settings.yml: |
    use_default_settings: true

    server:
      secret_key: "searxng-mcp-devtools-secret"
      bind_address: "0.0.0.0"
      port: 8080
      limiter: false
      image_proxy: false

    search:
      safe_search: 0
      autocomplete: ""
      default_lang: "en"
      formats:
        - html
        - json

    ui:
      static_use_hash: true

    engines:
      - name: google
        engine: google
        shortcut: g
        disabled: false
      - name: duckduckgo
        engine: duckduckgo
        shortcut: ddg
        disabled: false
      - name: bing
        engine: bing
        shortcut: b
        disabled: false
      - name: wikipedia
        engine: wikipedia
        shortcut: wp
        disabled: false
