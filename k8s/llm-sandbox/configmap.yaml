apiVersion: v1
kind: ConfigMap
metadata:
  name: sandbox-entrypoint
  namespace: llm-sandbox
data:
  entrypoint.sh: |
    #!/bin/bash
    set -e

    echo "==> Installing fuse-overlayfs..."
    apt-get update && apt-get install -y fuse-overlayfs ca-certificates

    UPPER="/pvc/upper"
    WORK="/pvc/work"
    LOWER="/rootfs"
    MERGED="/merged"

    mkdir -p "$UPPER" "$WORK" "$LOWER" "$MERGED"

    # Bind-mount the root filesystem WITHOUT submounts so that /rootfs/merged
    # and /rootfs/pvc are just empty dirs, not live mounts. This prevents
    # fuse-overlayfs (single-threaded) from recursing into its own FUSE
    # mountpoint when it stats lowerdir entries, which causes a deadlock.
    mount --bind / "$LOWER"

    fuse-overlayfs \
      -o lowerdir="$LOWER" \
      -o upperdir="$UPPER" \
      -o workdir="$WORK" \
      "$MERGED"

    # Bind-mount essential filesystems into the merged root
    mount --bind /proc "$MERGED/proc"
    mount --bind /sys "$MERGED/sys"
    mount --rbind /dev "$MERGED/dev"
    mount --bind /etc/resolv.conf "$MERGED/etc/resolv.conf"

    # Bind-mount host CA certificates into the chroot
    mkdir -p "$MERGED/host-ca"
    mount --bind /host-ca "$MERGED/host-ca"

    echo "Overlay mounted. Entering sandbox..."

    # Chroot into merged view and start the MCP server on port 1234
    exec chroot "$MERGED" /bin/bash -c "
      export SSL_CERT_FILE=/host-ca/ca-certificates.crt
      export SSL_CERT_DIR=/host-ca
      cd /root/mcp-devtools
      exec uv run uvicorn devtools.app:app --host 0.0.0.0 --port 1234
    "
